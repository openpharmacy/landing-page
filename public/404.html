<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OpenPharmacy</title>
    <!--
      GitHub Pages SPA fallback for BrowserRouter.

      When a user navigates directly to a path like /faq or refreshes a deep
      link, GitHub Pages serves this 404.html (it has no server-side routing).
      This script converts the path back into a query-string redirect so the
      main index.html can pick it up and restore the correct route via the
      script below.

      Technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1).join("/") +
          "/?p=" +
          l.pathname.slice(1).replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
