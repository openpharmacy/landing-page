name: CI
on:
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Puppeteer (used by vite-plugin-prerender) requires these system libs on Linux
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxcomposite1 libxrandr2 libxdamage1 libxfixes3 \
            libgbm1 libasound2t64 libpangocairo-1.0-0 libgtk-3-0

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build (with prerender)
        run: npm run build
        env:
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer
