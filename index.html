      GitHub Pages SPA redirect — companion to public/404.html.
      Restores the original deep-link path after the 404.html redirect.
    -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= query param set by 404.html
        var search = window.location.search;
        if (search.slice(1, 3) === "p=") {
          var decoded = decodeURIComponent(search.slice(3)).replace(/&/, "?");
          history.replaceState(null, null, "/" + decoded + window.location.hash);
        }
      })();
