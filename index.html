    <!--
      GitHub Pages SPA redirect restore.
      Companion to public/404.html — reads the ?p= query param set by the
      404 fallback and replaces the URL with the original path so BrowserRouter
      can match the correct route without a page reload.
    -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= param set by 404.html
        var search = location.search;
        if (search) {
          var p = new URLSearchParams(search).get("p");
          if (p) {
            var q = new URLSearchParams(search).get("q");
            history.replaceState(
              null,
              null,
              "/" + p.replace(/~and~/g, "&") + (q ? "?" + q.replace(/~and~/g, "&") : "") + location.hash
            );
          }
        }
      })();
    </script>
